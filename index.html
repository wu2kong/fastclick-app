<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickPad</title>
    <style>
      :root {
        /* Light theme (default) */
        --bg-primary: #ffffff;
        --bg-secondary: #f9fafb;
        --bg-tertiary: #f3f4f6;
        --bg-hover: #e5e7eb;
        --bg-active: #eff6ff;
        
        --text-primary: #111827;
        --text-secondary: #374151;
        --text-tertiary: #6b7280;
        --text-muted: #9ca3af;
        
        --border-primary: #e5e7eb;
        --border-secondary: #d1d5db;
        --border-focus: #2563eb;
        
        --accent-primary: #2563eb;
        --accent-secondary: #3b82f6;
        --accent-bg: #eff6ff;
        
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
        
        --danger-bg: #fef2f2;
        --danger-text: #dc2626;
        --danger-border: #fecaca;
        
        --success-bg: #f0fdf4;
        --success-text: #16a34a;
        
        --warning-bg: #fef3c7;
        --warning-text: #92400e;
      }
      
      html.dark {
        --bg-primary: #1f2937;
        --bg-secondary: #111827;
        --bg-tertiary: #374151;
        --bg-hover: #4b5563;
        --bg-active: #1e3a5f;
        
        --text-primary: #f9fafb;
        --text-secondary: #e5e7eb;
        --text-tertiary: #9ca3af;
        --text-muted: #6b7280;
        
        --border-primary: #374151;
        --border-secondary: #4b5563;
        --border-focus: #3b82f6;
        
        --accent-primary: #3b82f6;
        --accent-secondary: #60a5fa;
        --accent-bg: #1e3a5f;
        
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
        
        --danger-bg: #450a0a;
        --danger-text: #f87171;
        --danger-border: #7f1d1d;
        
        --success-bg: #052e16;
        --success-text: #4ade80;
        
        --warning-bg: #451a03;
        --warning-text: #fbbf24;
      }
      
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: var(--bg-secondary);
        color: var(--text-primary);
        transition: background-color 0.2s, color 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
